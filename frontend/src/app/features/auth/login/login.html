<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="brand-logo">
        <i class="fas fa-car"></i>
      </div>
      <h1>Yangi</h1>
      <p>Votre trajet, votre façon.<br>Rapide, sûr et fiable.</p>
    </div>
    <div class="auth-features">
      <div class="feature">
        <i class="fas fa-map-marker-alt"></i>
        <span>Commandez où vous êtes</span>
      </div>
      <div class="feature">
        <i class="fas fa-shield-alt"></i>
        <span>Trajets 100% sécurisés</span>
      </div>
      <div class="feature">
        <i class="fas fa-bolt"></i>
        <span>Chauffeurs disponibles 24h/7j</span>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-card-header">
        <h2>Bon retour 👋</h2>
        <p>Connectez-vous à votre compte</p>
      </div>

      @if (error) {
        <div class="alert alert-error">
          <i class="fas fa-circle-exclamation"></i>
          {{ error }}
        </div>
      }

      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Nom d'utilisateur</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input
              type="text"
              [(ngModel)]="username"
              name="username"
              placeholder="Votre nom d'utilisateur"
              autocomplete="username"
            />
          </div>
        </div>

        <div class="form-group">
          <label>Mot de passe</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="Votre mot de passe"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
              <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="loading">
          @if (loading) {
            <i class="fas fa-spinner fa-spin"></i> Connexion...
          } @else {
            <i class="fas fa-arrow-right-to-bracket"></i> Se connecter
          }
        </button>
      </form>

      <div class="auth-footer">
        <p>Pas encore de compte ? <a routerLink="/register">S'inscrire</a></p>
      </div>
    </div>
  </div>
</div>
